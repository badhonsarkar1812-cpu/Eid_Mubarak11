<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - Badhon Sarkar</title>
    <style>
        :root {
            --primary-glow: #ffd700;
            --secondary-glow: #00d4ff;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0a1128 0%, #00040a 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        /* --- Night Sky & Moon --- */
        .sky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .moon-container {
            position: absolute;
            top: 50px;
            right: 10%;
            width: 100px;
            height: 100px;
            z-index: -1;
        }

        .crescent {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 15px 15px 0 0 #fffbe6;
            filter: drop-shadow(0 0 20px rgba(255, 253, 230, 0.8));
            animation: moonPulse 4s ease-in-out infinite alternate;
        }

        @keyframes moonPulse {
            from { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255, 253, 230, 0.6)); }
            to { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(255, 253, 230, 0.9)); }
        }

        /* --- Fireworks Canvas --- */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* --- Glassmorphism Card --- */
        .eid-card {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem 2rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(255, 215, 0, 0.1);
            max-width: 90%;
            width: 500px;
            animation: cardFadeIn 1.5s ease-out;
            z-index: 10;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .eid-text {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            min-height: 1.2em;
        }

        .bengali-msg {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #e0e0e0;
            min-height: 3em;
        }

        /* --- Floating Lanterns --- */
        .lantern {
            position: absolute;
            bottom: -100px;
            width: 30px;
            height: 40px;
            background: rgba(255, 165, 0, 0.8);
            border-radius: 5px;
            box-shadow: 0 0 15px #ff4500;
            animation: floatUp 15s linear infinite;
        }

        .lantern::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: #ffcc00;
            border-radius: 50%;
            filter: blur(2px);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
        }

        /* --- Name Signature --- */
        .signature {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(90deg, #ffd700, #fff, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- Music Toggle --- */
        #music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            z-index: 100;
        }

        #music-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 215, 0, 0.2);
        }

        /* --- Sparkle Particles --- */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        @media (max-width: 600px) {
            .eid-text { font-size: 1.8rem; }
            .bengali-msg { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="sky-container" id="star-field"></div>
    <div class="moon-container">
        <div class="crescent"></div>
    </div>
    
    <canvas id="fireworks"></canvas>

    <div class="eid-card">
        <h1 class="eid-text" id="typing-title"></h1>
        <p class="bengali-msg" id="typing-msg"></p>
        <div class="signature">— Badhon Sarkar</div>
    </div>

    <button id="music-btn" onclick="toggleMusic()">🎵</button>
    <!-- Placeholder for soft Islamic instrumental music -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- Typing Animation ---
        const titleText = "ঈদ মোবারক! 🌙✨";
        const msgText = "ঈদের এই পবিত্র দিনে তোমার জীবনে আসুক শান্তি, সুখ ও সমৃদ্ধি। তোমার জন্য রইলো আন্তরিক শুভেচ্ছা। ঈদ মোবারক।";
        
        function typeWriter(elementId, text, speed, callback) {
            let i = 0;
            const element = document.getElementById(elementId);
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        // --- Sparkles & Stars ---
        function createStars() {
            const field = document.getElementById('star-field');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'sparkle';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                field.appendChild(star);
            }
        }

        // --- Lantern Generator ---
        function createLantern() {
            const lantern = document.createElement('div');
            lantern.className = 'lantern';
            lantern.style.left = Math.random() * 100 + '%';
            lantern.style.width = (Math.random() * 10 + 20) + 'px';
            lantern.style.height = (parseFloat(lantern.style.width) * 1.3) + 'px';
            lantern.style.animationDuration = (Math.random() * 10 + 10) + 's';
            document.body.appendChild(lantern);
            setTimeout(() => lantern.remove(), 15000);
        }

        // --- Fireworks Logic ---
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class FireworkParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 1;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.friction = 0.95;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function createExplosion(x, y) {
            const colors = ['#ffd700', '#ff0055', '#00d4ff', '#ffaa00', '#ffffff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 50; i++) {
                particles.push(new FireworkParticle(x, y, color));
            }
        }

        function animateFireworks() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((p, i) => {
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    p.update();
                    p.draw();
                }
            });

            if (Math.random() < 0.03) {
                createExplosion(Math.random() * canvas.width, Math.random() * canvas.height * 0.7);
            }
            requestAnimationFrame(animateFireworks);
        }

        // --- Audio Control ---
        const audio = document.getElementById('bg-music');
        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                document.getElementById('music-btn').innerHTML = '⏸';
            } else {
                audio.pause();
                document.getElementById('music-btn').innerHTML = '🎵';
            }
        }

        // --- Initialization ---
        window.onload = () => {
            resizeCanvas();
            createStars();
            animateFireworks();
            
            // Start typing sequences
            typeWriter("typing-title", titleText, 100, () => {
                typeWriter("typing-msg", msgText, 70);
            });

            // Continuously release lanterns
            setInterval(createLantern, 2000);
        };

        window.onresize = resizeCanvas;
    </script>
</body>
</html>
